name: Build and publish wiki

on:
  workflow_call:
    inputs:
      vendor:
        required: true
        type: string
      product:
        required: true
        type: string
      content_path:
        required: false
        type: string
        default: "docs"
    secrets:
      R2_ACCOUNT_ID:
        required: true
      R2_BUCKET:
        required: true
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true

permissions: {}

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out builder
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: tailstory-wiki/builder
          ref: main
          path: builder
          persist-credentials: false

      - name: Check out content
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: content
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: builder/package-lock.json

      - name: Install dependencies
        working-directory: builder
        run: npm ci

      - name: Link layouts into content
        run: ln -s "$GITHUB_WORKSPACE/builder/_includes" "$GITHUB_WORKSPACE/content/${{ inputs.content_path }}/_includes"

      - name: Run Eleventy
        working-directory: builder
        env:
          WIKI_INPUT_DIR: ${{ github.workspace }}/content/${{ inputs.content_path }}
          WIKI_OUTPUT_DIR: ${{ github.workspace }}/_site
          WIKI_DOCS_REPO: ${{ github.repository }}
          WIKI_DOCS_REF: ${{ github.ref_name }}
          WIKI_DOCS_PATH: ${{ inputs.content_path }}
        run: npx eleventy

      - name: Build TOCs
        working-directory: builder
        env:
          CONTENT_DIR: ${{ github.workspace }}/content/${{ inputs.content_path }}
          OUT_DIR: ${{ github.workspace }}/_site
          SCHEMA: ${{ github.workspace }}/builder/toc-schema.json
        run: npm run build:tocs

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site
          path: _site/
          retention-days: 1
          if-no-files-found: error

  publish:
    name: Publish to R2
    needs: build
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: site
          path: _site/

      - name: Sync to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          VENDOR: ${{ inputs.vendor }}
          PRODUCT: ${{ inputs.product }}
        run: |
          aws s3 sync _site/ s3://$R2_BUCKET/$VENDOR/$PRODUCT/ \
            --endpoint-url https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com \
            --delete
